<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>2 Pairs Step Sequencer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>2 Pairs Step Sequencer</h2>

<button id="playBtn" class="button ctl-btn">Start</button>
<button id="settingBtn" class="button ctl-btn">Setting</button>

<div id="app">
  <div id="left">
    <span class="seq-title seq1">Sequence1</span>
    <input id="patternName1" type="text" placeholder="pattern name">
    <button id="saveBtn1" class="button seq1">Save</button>
    <button id="clrBtn1" class="button seq1">Clear</button>
    <div id="sequencer1"></div>

    <br>

    <span class="seq-title seq2">Sequence2</span>
    <input id="patternName2" type="text" placeholder="pattern name">
    <button id="saveBtn2" class="button seq2">Save</button>
    <button id="clrBtn2" class="button seq2">Clear</button>
    <div id="sequencer2"></div>
  </div>

  <div id="right">
    <div id="tabs"></div>

    <div id="tabContents">

      <div id="patternTab" class="tabContent">
        <br>
        <input id="patternSearch" type="text" placeholder="search pattern..." />
        <ul id="patternList"></ul>
        <br>
        <button class="button" onclick="exportAllPatterns()">Export All</button>
        <label class="button">
          Import
          <input type="file" class="hidden" onchange="importPatterns(this.files[0])">
        </label>
        <span id="fileName" class="track">No file</span>
      </div>

      <div id="soundTab" class="tabContent" style="display:none;">
        <br>
        <div id="soundSettings"></div>

      </div>

      <div id="moveTab" class="tabContent" style="display:none;">
        <br>
        <div id="moveControl"></div>
        <div class="form">
          <div class="form-row">
            <label class="form-label seq1">Sequence1</label>
            <div>
              <button id="move-seq1-left" class="button">Left</button>
            </div>
          </div>
        </div>
      </div>

      <div id="mixerTab" class="tabContent" style="display:none;">
        <br>
        <div id="mixerSliders">
          <div class="mixer-channel">
            <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume(0, this.value)">
            <span class="seq-title seq1">Sequence1</span>
          </div>
          <div class="mixer-channel">
            <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume(1, this.value)">
            <span class="seq-title seq2">Sequence2</h3>
          </div>
        </div>
        <div>
          <input class="mixer-balance" type="range" min="0" max="1" step="0.01" value="0.5" oninput="setBalance(this.value)">
        </div>
      </div>

    </div>
  </div>
</div>

<div id="stepPopup" class="popup hidden">
  <div class="popup-content">
    <h3 id="popTitle"></h3>
    <div id="subTitle"></div>
    <br>
    <div id="stepControl"></div>
    <div id="stepSliders"></div>
  </div>
</div>

<div id="soundPopup" class="popup hidden">
  <div class="popup-content">
    <h3 id="soundTitle"></h3>
    <div class="form">
      <div class="form-row">
        <label class="form-label seq1">Sequence1</label>
        <div id="sound-load1" class="sequence-mode"></div>
      </div>
      <div class="form-row">
        <label class="form-label seq2">Sequence2</label>
        <div id="sound-load2" class="sequence-mode"></div>
      </div>
    </div>
  </div>
</div>

<div id="settingPopup" class="popup hidden">
  <div class="popup-content">
    <h3>Setting</h3>
    <div class="form">
      <div class="form-row">
        <label class="form-label stg">tempo</label>
        <div>
          <input id="tempo-bar" type="range" min="40" max="200" step="1">
          <span id="tempo-span">120</span>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label stg">sequence mode</label>
        <div id="sequence-mode" class="sequence-mode"></div>
      </div>
    </div>
  </div>
</div>

<script src="script/tabUI.js"></script>
<script src="script/noise.js"></script>
<script src="script/sequencerUI.js"></script>
<script src="script/sequencer.js"></script>
<script src="script/settingUI.js"></script>
<script src="script/moveUI.js"></script>
<script src="script/move.js"></script>
<script src="script/patternUI.js"></script>
<script src="script/pattern.js"></script>
<script src="script/soundUI.js"></script>
<script src="script/sound.js"></script>
<script src="script/mixer.js"></script>
<script src="script/velocity.js"></script>
<script src="script/main.js"></script>
</body>
</html>
