<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Step Sequencer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h2>Step Sequencer</h2>

<div id="app">
  <div id="left">
    <button id="playBtn" class="button ctl-btn" onclick="start()">Start</button>
    <button class="button ctl-btn" onclick="openMixer()">Mixer</button>

    <br><br>

    <span class="seq-title seq1">Sequence1</span>
    <input id="patternName0" placeholder="pattern name">
    <button class="button seq1" onclick="savePattern(0)">Save</button>
    <button class="button seq1" onclick="clearPattern(0)">Clear</button>
    <div id="sequencer0"></div>

    <br>

    <span class="seq-title seq2">Sequence2</h3>
    <input id="patternName1" placeholder="pattern name">
    <button class="button seq2" onclick="savePattern(1)">Save</button>
    <button class="button seq2" onclick="clearPattern(1)">Clear</button>
    <div id="sequencer1"></div>

  </div>

  <div id="right">
    <h3>Pattern</h3>
    <ul id="patternList"></ul>
    <br><br>
    <button class="button" onclick="exportAllPatterns()">Export All</button>
    <br><br>
    <label class="button">
      Import
      <input type="file" class="hidden" onchange="importPatterns(this.files[0])">
    </label>
    <span id="fileName">No file</span>
  </div>

</div>

<div id="velocityPopup" class="popup hidden">
  <div class="popup-content">
    <h3>Velocity</h3>
    <span id="seqTitle"></span>
    <span id="trackTitle"></span>
    <br><br>
    <div id="velocitySliders"></div>
  </div>
</div>

<div id="mixerPopup" class="popup hidden">
  <div class="popup-content">
    <h3>Mixer</h3>
    <div id="mixerSliders">
      <div class="mixer-channel">
        <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume(0, this.value)">
        <span class="seq-title seq1">Sequence1</span>
      </div>
      <div class="mixer-channel">
        <input type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume(1, this.value)">
        <span class="seq-title seq2">Sequence2</h3>
      </div>
    </div>
    <div>
      <input class="mixer-balance" type="range" min="0" max="1" step="0.01" value="0.5" oninput="setBalance(this.value)">
    </div>
  </div>
</div>

<script src="script/inst.js"></script>
<script src="script/sequenceUI.js"></script>
<script src="script/sequencer.js"></script>
<script src="script/patternUI.js"></script>
<script src="script/pattern.js"></script>
<script src="script/mixer.js"></script>
<script src="script/velocity.js"></script>
<script src="script/main.js"></script>
</body>
</html>
